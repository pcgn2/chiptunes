<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptune Player - Keygen Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff00aa;
            --accent-green: #00ff88;
            --accent-orange: #ff8800;
            --text-primary: #e0e0e0;
            --text-secondary: #888899;
            --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.5);
            --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 170, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--glow-cyan);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }

        .player-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 900px) {
            .player-container {
                grid-template-columns: 1fr;
            }
        }

        .now-playing {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .now-playing::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta), var(--accent-green));
        }

        .visualizer {
            height: 150px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            padding: 10px;
            overflow: hidden;
        }

        .visualizer-bar {
            width: 4px;
            background: linear-gradient(to top, var(--accent-cyan), var(--accent-magenta));
            border-radius: 2px;
            transition: height 0.05s ease;
        }

        .track-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--accent-cyan);
            margin-bottom: 5px;
            text-shadow: var(--glow-cyan);
        }

        .track-artist {
            font-size: 1.3rem;
            color: var(--accent-magenta);
            margin-bottom: 5px;
        }

        .track-game {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            background: transparent;
            color: var(--accent-cyan);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            box-shadow: var(--glow-cyan);
        }

        .control-btn.play-btn {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            border-color: var(--accent-magenta);
            color: var(--accent-magenta);
        }

        .control-btn.play-btn:hover {
            background: var(--accent-magenta);
            color: var(--bg-primary);
            box-shadow: var(--glow-magenta);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .volume-slider {
            width: 120px;
            -webkit-appearance: none;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-green);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .playlist-panel {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .playlist-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
        }

        .track-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .playlist {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan) var(--bg-tertiary);
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 3px;
        }

        .playlist-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 5px;
            border-left: 3px solid transparent;
        }

        .playlist-item:hover {
            background: var(--bg-tertiary);
        }

        .playlist-item.active {
            background: var(--bg-tertiary);
            border-left-color: var(--accent-magenta);
        }

        .playlist-item.playing {
            border-left-color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .playlist-item-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item.active .playlist-item-title {
            color: var(--accent-cyan);
        }

        .playlist-item-artist {
            font-size: 0.85rem;
            color: var(--accent-magenta);
        }

        .playlist-item-game {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-cyan);
            border-right-color: var(--accent-magenta);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            letter-spacing: 2px;
        }

        .shuffle-btn {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .shuffle-btn:hover, .shuffle-btn.active {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .format-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            margin-left: 8px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loader"></div>
        <div class="loading-text">Loading tracks...</div>
    </div>

    <div class="container">
        <header>
            <h1>KEYGEN MUSIC</h1>
            <div class="subtitle">CHIPTUNE PLAYER • .MOD • .XM • .IT • .S3M</div>
        </header>

        <div class="player-container">
            <div class="now-playing">
                <div class="visualizer" id="visualizer">
                </div>

                <div class="track-info">
                    <div class="track-title" id="trackTitle">Select a track</div>
                    <div class="track-artist" id="trackArtist">-</div>
                    <div class="track-game" id="trackGame">-</div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="shuffleBtn" title="Shuffle">⟳</button>
                    <button class="control-btn" id="prevBtn" title="Previous">⏮</button>
                    <button class="control-btn play-btn" id="playBtn" title="Play">▶</button>
                    <button class="control-btn" id="nextBtn" title="Next">⏭</button>
                    <button class="control-btn" id="stopBtn" title="Stop">⏹</button>
                    <button class="control-btn airplay-btn" id="airplayBtn" title="AirPlay">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/>
                        </svg>
                    </button>
                </div>

                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>

                <div class="volume-container">
                    <span>🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                </div>
            </div>

            <div class="playlist-panel">
                <div class="playlist-header">
                    <span class="playlist-title">Library</span>
                    <span class="track-count" id="trackCount">0 tracks</span>
                </div>
                <input type="text" class="search-box" id="searchBox" placeholder="Search tracks...">
                <div class="playlist" id="playlist"></div>
            </div>
        </div>
    </div>

    <script src="js/libopenmpt.js"></script>
    <script src="js/chiptune2.js"></script>
    <script src="js/tracks.js"></script>
    <script>
        // Use local files
        const BASE_URL = '';
        
        let tracks = TRACKS;
        let filteredTracks = [...tracks];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isShuffled = false;
        let player;
        let isPaused = false;

        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stopBtn = document.getElementById('stopBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const playlist = document.getElementById('playlist');
        const searchBox = document.getElementById('searchBox');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const trackGame = document.getElementById('trackGame');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const progressFill = document.getElementById('progressFill');
        const trackCount = document.getElementById('trackCount');
        const visualizer = document.getElementById('visualizer');
        const loading = document.getElementById('loading');

        function initPlayer() {
            player = new ChiptuneJsPlayer(new ChiptuneJsConfig(0));
            
            player.onEnded(function() {
                playNext();
            });

            player.onError(function(e) {
                console.error('Player error:', e);
                playNext();
            });
        }

        function init() {
            initPlayer();
            tracks = TRACKS;
            filteredTracks = [...tracks];
            trackCount.textContent = `${tracks.length} tracks`;
            renderPlaylist();
            initVisualizer();
            loading.classList.add('hidden');
        }

        function getFileExtension(path) {
            const match = path.match(/\.([^.]+)$/);
            return match ? match[1].toUpperCase() : '';
        }

        function renderPlaylist() {
            playlist.innerHTML = '';
            filteredTracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                if (index === currentTrackIndex) {
                    item.classList.add('active');
                    if (isPlaying) item.classList.add('playing');
                }
                
                const ext = getFileExtension(track.path);
                
                item.innerHTML = `
                    <div class="playlist-item-title">${track.sn}${track.sn ? ' ' : ''}<span class="format-badge">${ext}</span></div>
                    <div class="playlist-item-artist">${track.rg || 'Unknown'}</div>
                    <div class="playlist-item-game">${track.mdt || ''}</div>
                `;
                
                item.addEventListener('click', () => playTrack(index));
                playlist.appendChild(item);
            });
        }

        async function playTrack(index) {
            if (index < 0 || index >= filteredTracks.length) return;
            
            currentTrackIndex = index;
            const track = filteredTracks[index];
            
            trackTitle.textContent = track.sn || 'Unknown';
            trackArtist.textContent = track.rg || 'Unknown';
            trackGame.textContent = track.mdt || '';
            
            renderPlaylist();
            
            try {
                // Stream from keygenmusic.tk with proper URL encoding
                const encodedPath = track.path.split('/').map(part => encodeURIComponent(part)).join('/');
                player.load('https://keygenmusic.tk' + encodedPath, function(buffer) {
                    player.play(buffer);
                    isPlaying = true;
                    isPaused = false;
                    playBtn.textContent = '⏸';
                    
                    const meta = player.metadata();
                    const dur = player.duration();
                    totalTimeEl.textContent = formatTime(dur);
                    
                    updateProgress();
                    updateVisualizer();

                    // MediaSession API for iOS Control Center / Lock Screen
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: track.sn || 'Unknown',
                            artist: track.rg || 'Unknown',
                            album: track.mdt || 'Keygen Music'
                        });
                        navigator.mediaSession.setActionHandler('play', () => togglePlay());
                        navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                        navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
                        navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
                    }
                });
            } catch (e) {
                console.error('Failed to play track:', e);
            }
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && filteredTracks.length > 0) {
                playTrack(0);
                return;
            }
            
            if (isPlaying) {
                player.togglePause();
                isPaused = !isPaused;
                playBtn.textContent = isPaused ? '▶' : '⏸';
            } else {
                playTrack(currentTrackIndex);
            }
        }

        function stop() {
            if (player && player.currentPlayingNode) {
                player.stop();
                isPlaying = false;
                isPaused = false;
                playBtn.textContent = '▶';
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
            }
        }

        function playNext() {
            let nextIndex;
            if (isShuffled) {
                nextIndex = Math.floor(Math.random() * filteredTracks.length);
            } else {
                nextIndex = (currentTrackIndex + 1) % filteredTracks.length;
            }
            playTrack(nextIndex);
        }

        function playPrev() {
            const prevIndex = currentTrackIndex <= 0 ? filteredTracks.length - 1 : currentTrackIndex - 1;
            playTrack(prevIndex);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleBtn.classList.toggle('active', isShuffled);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        let progressInterval = null;

        function updateProgress() {
            if (progressInterval) clearInterval(progressInterval);
            
            progressInterval = setInterval(() => {
                if (!isPlaying || isPaused || !player) return;
                
                const meta = player.metadata();
                const dur = player.duration();
                const row = player.getCurrentRow();
                const order = player.getCurrentOrder();
                
                if (dur > 0) {
                    const current = (order * 10) + (row / 100);
                    const percent = Math.min((current / dur) * 100, 100);
                    progressFill.style.width = `${percent}%`;
                    currentTimeEl.textContent = formatTime(current);
                }
            }, 100);
        }

        function initVisualizer() {
            for (let i = 0; i < 64; i++) {
                const bar = document.createElement('div');
                bar.className = 'visualizer-bar';
                bar.style.height = '5px';
                visualizer.appendChild(bar);
            }
        }

        function updateVisualizer() {
            const bars = visualizer.children;
            function draw() {
                if (!isPlaying) return;
                
                for (let i = 0; i < bars.length; i++) {
                    const height = Math.random() * 80 + 10;
                    bars[i].style.height = `${height}px`;
                }
                
                requestAnimationFrame(draw);
            }
            draw();
        }

        function filterTracks(query) {
            query = query.toLowerCase();
            filteredTracks = tracks.filter(track => 
                (track.sn && track.sn.toLowerCase().includes(query)) ||
                (track.rg && track.rg.toLowerCase().includes(query)) ||
                (track.mdt && track.mdt.toLowerCase().includes(query))
            );
            currentTrackIndex = -1;
            renderPlaylist();
        }

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        stopBtn.addEventListener('click', stop);
        shuffleBtn.addEventListener('click', toggleShuffle);

        // AirPlay button handler
        const airplayBtn = document.getElementById('airplayBtn');
        airplayBtn.addEventListener('click', async () => {
            if (!player || !player.context) return;

            // Method 1: Safari - use webkitShowPlaybackTargetPicker
            if (player.context.destination.webkitShowPlaybackTargetPicker) {
                player.context.destination.webkitShowPlaybackTargetPicker();
                return;
            }

            // Method 2: Chrome/Edge - use setSinkId for Cast/AirPlay
            try {
                const devices = await navigator.mediaDevices.selectAudioOutput();
                if (devices.deviceId && devices.deviceId !== 'default') {
                    // Try to redirect audio using an audio element
                    if (currentTrackIndex >= 0) {
                        const path = filteredTracks[currentTrackIndex].path.split('/').map(p => encodeURIComponent(p)).join('/');
                        const audioEl = new Audio('https://keygenmusic.tk' + path);
                        await audioEl.setSinkId(devices.deviceId);
                        audioEl.play();
                        // Stop WebAudio player
                        if (player.currentPlayingNode) {
                            player.stop();
                        }
                        isPlaying = true;
                        playBtn.textContent = '⏸';
                        airplayBtn.style.color = 'var(--accent-green)';
                        return;
                    }
                }
            } catch (e) {
                console.log('Audio output selection cancelled or failed');
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            if (player && player.gainNode) {
                player.gainNode.gain.value = e.target.value / 100;
            }
        });

        progressBar.addEventListener('click', (e) => {
            // Seeking not supported in this player implementation
        });

        searchBox.addEventListener('input', (e) => {
            filterTracks(e.target.value);
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    playNext();
                    break;
                case 'ArrowLeft':
                    playPrev();
                    break;
                case 'KeyS':
                    toggleShuffle();
                    break;
            }
        });

        // Wait for Module to load from libopenmpt.js
        var checkModule = setInterval(function() {
            if (typeof Module !== 'undefined' && typeof ChiptuneJsPlayer !== 'undefined') {
                clearInterval(checkModule);
                init();
            }
        }, 100);
    </script>
</body>
</html>
